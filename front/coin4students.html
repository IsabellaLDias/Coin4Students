<h2>Cadastro de Aluno</h2>
<form id="formAluno">
  <input id="nomeAluno" placeholder="Nome">
  <input id="emailAluno" placeholder="Email">
  <input id="senhaAluno" placeholder="Senha">
  <input id="cpfAluno" placeholder="CPF">
  <input id="rgAluno" placeholder="RG">
  <input id="enderecoAluno" placeholder="Endereço">
  <input id="cursoAluno" placeholder="Curso">

</form>
