<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Portal do Aluno - Coin4Students</title>
    <link rel="stylesheet" href="./css/style-aluno.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="dashboard-body">

    <aside class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Coin4Students">
            <span>Coin4Students</span>
        </div>
        <nav class="menu">
            <a href="#" onclick="trocarTab('home')" id="btn-home" class="active"><i class="ph ph-house"></i> Home</a>
            <a href="#" onclick="trocarTab('vantagens')" id="btn-vantagens"><i class="ph ph-ticket"></i> Resgatar</a>
            <a href="#" onclick="trocarTab('extrato')" id="btn-extrato"><i class="ph ph-article"></i> Extrato</a>
            <a href="#" onclick="trocarTab('perfil')" id="btn-perfil"><i class="ph ph-user"></i> Meu Perfil</a>
        </nav>
        <button class="btn-logout" onclick="logout()"><i class="ph ph-sign-out"></i> Sair</button>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="user-info">
                <span>Bem-vindo, <strong id="nomeAluno">Carregando...</strong></span>
            </div>
        </header>

        <div id="secao-home">
            <div class="saldo-card">
                <p>Saldo Disponível</p>
                <span class="saldo-valor" id="valorSaldo">0</span> Moedas
            </div>

            <section class="content-grid">
                <div class="card">
                    <h3><i class="ph ph-article"></i> Transações Recentes</h3>
                    <div id="extratoHome" class="lista-dinamica"></div>
                </div>

                <div class="card">
                    <h3><i class="ph ph-shopping-cart"></i> Sugestões de Resgate</h3>
                    <div id="vantagensHome" class="grid-vantagens"></div>
                </div>
            </section>
        </div>

        <div id="secao-extrato" style="display:none">
            <div class="card">
                <h3><i class="ph ph-article"></i> Histórico Completo de Transações</h3>
                <div id="extratoLista" class="lista-dinamica"></div>
            </div>
        </div>

        <div id="secao-vantagens" style="display:none">
            <div class="card">
                <h3><i class="ph ph-shopping-cart"></i> Todas as Vantagens</h3>
                <div id="vantagensLista" class="grid-vantagens"></div>
            </div>
        </div>

        <div id="secao-perfil" style="display:none">
            <div class="card perfil-card">
                <h3><i class="ph ph-user-gear"></i> Meu Perfil</h3>
                <form id="formPerfil" onsubmit="event.preventDefault();">
                    <div class="perfil-grid">
                        <div>
                            <label>Nome Completo:</label>
                            <input type="text" id="perfilNome">
                        </div>
                        <div>
                            <label>E-mail:</label>
                            <input type="email" id="perfilEmail" readonly style="background: #f0f0f0; cursor: not-allowed;">
                        </div>
                        <div>
                            <label>CPF:</label>
                            <input type="text" id="perfilCPF" readonly
                                style="background: #f0f0f0; cursor: not-allowed;">
                        </div>
                        <div>
                            <label>RG:</label>
                            <input type="text" id="perfilRG" readonly style="background: #f0f0f0; cursor: not-allowed;">
                        </div>
                        <div>
                            <label>Endereço:</label>
                            <input type="text" id="perfilEndereco">
                        </div>
                        <div>
                            <label>Curso:</label>
                            <input type="text" id="perfilInstituicao">
                        </div>
                        <div>
                            <label>Nova Senha:</label>
                            <input type="password" id="perfilNovaSenha" placeholder="Deixe em branco para manter atual" autocomplete="new-password">
                        </div>
                        <div>
                            <label>Confirmar Nova Senha:</label>
                            <input type="password" id="perfilConfirmarSenha" placeholder="Repita a nova senha" autocomplete="new-password">
                        </div>
                    </div>

                    <div class="perfil-acoes">
                        <button type="button" class="btn-salvar-perfil" onclick="atualizarPerfil()">Salvar
                            Alterações</button>
                        <button type="button" class="btn-excluir-perfil" onclick="excluirConta()">Excluir Conta</button>
                    </div>
                </form>
            </div>
        </div>


    </main>
    <script src="./js/aluno.js"></script>
    <div id="toastContainer" class="toast-container"></div>

    <!-- Modal de Confirmação de Exclusão-->
    <div id="confirmModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir sua conta? Esta ação é permanente!</p>
            <div class="modal-buttons">
                <button class="btn-modal-cancel" onclick="fecharConfirmModal()">Cancelar</button>
                <button class="btn-modal-confirm" onclick="confirmarExclusao()">Excluir Conta</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastFadeOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        window.showSystemMessage = showToast;
    </script>
    <script src="aluno.js"></script>
</body>

</html>
