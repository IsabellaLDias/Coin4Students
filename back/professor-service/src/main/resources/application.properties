spring.application.name=professor-service

server.port=${PORT:8080}

aluno.service.url=${ALUNO_SERVICE_URL:https://aluno-service-aqwz.onrender.com}
transacao.service.url=${TRANSACAO_SERVICE_URL:https://transacao-service-hc98.onrender.com}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
