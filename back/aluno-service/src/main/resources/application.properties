spring.application.name=aluno-service

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

transacao.service.url=${TRANSACAO_SERVICE_URL:https://transacao-service-nv1r.onrender.com}

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:isabellamg2017@gmail.com}
brevo.from.name=${BREVO_FROM_NAME:coin4students}
brevo.logo.url=${BREVO_LOGO_URL:}
