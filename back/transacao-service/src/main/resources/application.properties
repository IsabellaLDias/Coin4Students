spring.application.name=transacao-service

server.port=${PORT:8080}

aluno.service.url=${ALUNO_SERVICE_URL:https://aluno-service-kzwc.onrender.com}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:isabellamg2017@gmail.com}
brevo.from.name=${BREVO_FROM_NAME:coin4students}
brevo.logo.url=${BREVO_LOGO_URL:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.amqp.deserialization.trust.all=true
